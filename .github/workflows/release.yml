name: Build

on:
  push:
    tags:
      - '[0-9v]*'
    paths-ignore:
      - ".github/**"
      - "README.md"
      - ".luarc.json"
      - "annotations.lua"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 生成更新日志写入Update.lua
        run: |
          if [ ! -f "Update.lua" ]; then
            echo "Update.lua 不存在，跳过更新日志生成"
            exit 0
          fi

          mapfile -t TAGS < <(git tag --sort=-creatordate)
          TAG_COUNT=${#TAGS[@]}

          if [ "$TAG_COUNT" -lt 1 ]; then
            echo "没有找到标签，跳过"
            exit 0
          fi

          CHANGES=""
          # 最多处理5个标签段
          for ((i = 0; i < 5 && i + 1 < TAG_COUNT; i++)); do
            CUR="${TAGS[i]}"
            NEXT="${TAGS[i+1]}"

            ENTRIES=""
            for hash in $(git rev-list "$NEXT..$CUR" 2>/dev/null); do
              MSG=$(git log --format="%s" -1 "$hash" 2>/dev/null)
              FILES=$(git show --name-only --format="" "$hash" 2>/dev/null | tr '\n' ', ' | sed 's/^, //' | sed 's/, *$//' | sed 's/, ,//g')
              [ -z "$FILES" ] && FILES="$hash"
              ENTRIES+="$FILES|$MSG"$'\n'
            done

            if [ -n "$ENTRIES" ]; then
              CHANGES+="|cff3cff00## $CUR|r"$'\n'
              while IFS= read -r line; do
                [ -z "$line" ] && continue
                f="${line%%|*}"
                m="${line#*|}"
                CHANGES+="* $m |cfff0ff00$f|r"$'\n'
              done <<< "$ENTRIES"
              CHANGES+=$'\n'
            fi
          done

          {
            echo "local _, ns = ..."
            echo "ns.UpdateText = [["
            echo "$CHANGES"
            echo "]]"
          } > Update.lua

          echo "已生成 Update.lua"

      - uses: BigWigsMods/packager@master
        with:
          args: -p 307518 -a BKpgPa6E
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
          GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
